<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes breathe {
      0% { 
        stroke-opacity: 0.2; 
        stroke-width: 1.5; 
        filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.2));
      }
      100% { 
        stroke-opacity: 1; 
        stroke-width: 3.5; 
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
      }
    }
    .glass-box {
      animation: breathe 4s infinite alternate ease-in-out;
    }
    .title-text {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 48px;
      fill: #D4AF37;
      font-weight: 300;
      letter-spacing: 18px;
      text-transform: uppercase;
    }
  </style>

  <rect x="100" y="125" width="600" height="150" rx="4" fill="#08080A" fill-opacity="0.9" stroke="#D4AF37" stroke-width="2" class="glass-box" />

  <text x="400" y="218" text-anchor="middle" class="title-text">PROJECT KORE</text>
</svg>
